# docker-compose.yml — Microserices-Sync full experiment environment
# Usage: docker-compose up --build   (first run / after code changes)
#        docker-compose up            (subsequent runs)
#        docker-compose down           (stop & remove containers, keep volumes)
# Requires: .env file at this directory with SA_PASSWORD=<value>

services:
  # ── SQL Server (ServerService database) ────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: serverservice-sqlserver
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - serverservice_sqlserver_data:/var/opt/mssql
    networks:
      - microservices-sync-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ServerService ──────────────────────────────────────────────────────────
  serverservice:
    image: serverservice:latest
    container_name: serverservice-app
    build:
      context: .
      dockerfile: ServerService/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ServerServiceDb;User=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True
    volumes:
      - serverservice_logs:/app/logs
    networks:
      - microservices-sync-network
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── ClientService instances (5 users) ──────────────────────────────────────
  clientservice_user1:
    image: clientservice:latest
    container_name: clientservice-app-user1
    build:
      context: .
      dockerfile: ClientService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/SqLiteDatabase/ClientServiceDbUser1.sqlite
      - ClientIdentity__UserId=00000000-0000-0000-0000-000000000001
      - SERVER_BASE_URL=http://serverservice:8080
    volumes:
      - clientservice_sqlite_data_user1:/app/SqLiteDatabase
      - clientservice_logs_user1:/app/logs
    networks:
      - microservices-sync-network
    depends_on:
      serverservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  clientservice_user2:
